# Vector retrieval experiment: same params as best baseline but with vector blocking
# Best baseline: merge_t=0.8, wa=1.0 → Pre=99.29, Re=94.59, F1=93.96
dataset: dblp-acm1
atomic_t: 0.9
bootstrap_t: 0.95
merge_t: 0.8
wa: 0.9
bridges_n: 10
scenario_prefix: "vec-"

# Vector retrieval settings
use_vector_blocking: true
vector_model: all-MiniLM-L6-v2
vector_top_k: 50
vector_min_cosine: 0.5
vector_sim_blend: 0.3
vector_hnsw_m: 32
vector_hnsw_ef_construction: 128
vector_hnsw_ef_search: 128
